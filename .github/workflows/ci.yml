# PR/main build validation only (no registry push). Publish is publish.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    name: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production target (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          load: true
          tags: ghcr.io/xgic/xgic-gitlab:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke health endpoint
        run: |
          set -euo pipefail
          docker run -d --name xgic-gitlab-ci -p 18080:8080 ghcr.io/xgic/xgic-gitlab:ci
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:18080/healthz" | grep -q ok; then
              echo "healthz ok"
              docker rm -f xgic-gitlab-ci
              exit 0
            fi
            sleep 1
          done
          docker logs xgic-gitlab-ci || true
          docker rm -f xgic-gitlab-ci || true
          echo "healthz failed"
          exit 1
