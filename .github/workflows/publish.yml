# Publish production orchestration image to GHCR.
# Uses the workflow GITHUB_TOKEN (short-lived, no long-lived registry PAT).
# PRs stay build-only via ci.yml; this workflow never pushes on pull_request.
name: Publish GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # Product image name (not ghcr.io/<repo>/...); consumed by xgic/gitlab Compose.
  IMAGE_NAME: xgic/xgic-gitlab

jobs:
  publish:
    name: publish-ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=xgic-gitlab
            org.opencontainers.image.description=Production orchestration image for XGIC GitLab Compose stacks (ghcr.io/xgic/xgic-gitlab). Built by the xgic/gitlab-dev producer; not a Dev Container and not GitLab EE.
            org.opencontainers.image.url=https://github.com/xgic/gitlab-dev
            org.opencontainers.image.documentation=https://github.com/xgic/gitlab-dev#readme
            org.opencontainers.image.source=https://github.com/xgic/gitlab-dev
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=XGIC

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Publish GHCR"
            echo ""
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`"
            echo "- Target stage: \`production\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo "- Tags:"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Template consumer: https://github.com/xgic/gitlab"
          } >> "$GITHUB_STEP_SUMMARY"
